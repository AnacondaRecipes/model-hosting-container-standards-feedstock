{% set name = "model-hosting-container-standards" %}
{% set version = "0.1.15" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # The PyPI sdist omits the LICENSE file (only README + pyproject + sources are
  # included), so we fetch it separately from the upstream tag.
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
    sha256: ae8dd74d3250545c14f0a7068186c7b0f0ab6563d31e7137f556b6b660c8a6a9
  - url: https://raw.githubusercontent.com/aws/model-hosting-container-standards/v{{ version }}/LICENSE
    sha256: 09e8a9bcec8067104652c168685ab0931e7868f9c8284b66f5ae6edae5f1130b

build:
  number: 0
  # supervisor (a hard runtime dep) is not packaged on win-64 in pkgs/main and
  # the upstream framework targets Linux/macOS container hosting, so skip win.
  skip: true  # [py<310 or win]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - generate-supervisor-config = model_hosting_container_standards.supervisor.scripts.generate_supervisor_config:main
    - standard-supervisor = model_hosting_container_standards.supervisor.scripts.standard_supervisor:main

requirements:
  host:
    - pip
    - python
    - poetry-core >=2.0.0,<3.0.0
  run:
    - python
    - fastapi
    - httpx
    - jmespath
    - pydantic
    # setuptools is a runtime dependency: the dependency_manager module uses
    # pkg_resources / pip programmatically to install requirements.txt from
    # downloaded model artifacts.
    - setuptools
    - starlette >=0.49.1
    - supervisor >=4.2.0

test:
  imports:
    - model_hosting_container_standards
    - model_hosting_container_standards.common
    - model_hosting_container_standards.sagemaker
  commands:
    - pip check
    - generate-supervisor-config --help
    # standard-supervisor wraps execvp() and intentionally has no --help/--version
    # flag (it forwards every arg through to the wrapped launch command), so we
    # only assert the entry-point script is on PATH.
    - which standard-supervisor
  requires:
    - pip

about:
  home: https://github.com/aws/model-hosting-container-standards
  summary: Python toolkit for standardized model hosting container implementations with Amazon SageMaker integration
  description: |
    A standardized Python framework for seamless integration between ML
    frameworks (TensorRT-LLM, vLLM) and Amazon SageMaker hosting. The
    package provides a unified handler system with consistent /ping and
    /invocations endpoints across frameworks, flexible configuration via
    environment variables or decorators, and automatic dependency
    installation from requirements.txt in model artifacts.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  doc_url: https://github.com/aws/model-hosting-container-standards
  dev_url: https://github.com/aws/model-hosting-container-standards

extra:
  recipe-maintainers:
    - xkong-anaconda
